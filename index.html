<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KASI-FLAME</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5;color:#111}

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 30px;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:#fff;
      font-size:24px;
      font-weight:bold;
    }

    .nav-logo{
      width:56px;
      height:56px;
      object-fit:cover;
      border-radius:50%;
      padding:6px;
      background:#111;
      border:2px solid rgba(255,255,255,.18);
      box-shadow:0 0 0 3px rgba(255,255,255,.06),0 0 18px rgba(255,120,0,.35),0 0 30px rgba(255,80,0,.18);
    }

    .nav-links{display:flex;gap:24px}
    .nav-links a{text-decoration:none;color:#fff;font-weight:bold}

    .hero{
      background:#111;
      color:#fff;
      padding:60px 20px;
      text-align:center;
    }

    .hero h1{font-size:42px;margin-bottom:10px}
    .hero p{opacity:.8}

    .menu{
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{padding:16px}
    .card h3{margin-bottom:8px}
    .price{font-weight:bold;font-size:20px;margin:10px 0}

    button{
      background:#111;
      color:#fff;
      border:none;
      padding:12px 16px;
      border-radius:10px;
      cursor:pointer;
    }

    .floating-cart{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#111;
      color:#fff;
      padding:14px 18px;
      border-radius:999px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.2);
    }

    .cart-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .cart-box{
      background:#fff;
      width:90%;
      max-width:500px;
      padding:20px;
      border-radius:16px;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      margin:12px 0;
    }

    @media(max-width:768px){
      .hero h1{font-size:30px}
      .nav-links{gap:14px}
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="brand">
    <img src="assets/images/logo.png" class="nav-logo" alt="KASI-FLAME Logo">
    <span>KASI-FLAME</span>
  </a>

  <div class="nav-links">
    <a href="#menu">Shop</a>
    <a href="#" onclick="toggleCart()">Cart</a>
  </div>
</nav>

<section class="hero">
  <h1>Kasi Food. Fast Flame.</h1>
  <p>Affordable lunch for the working kasi.</p>
</section>

<section id="menu" class="menu"></section>

<div class="floating-cart" onclick="toggleCart()">
  Cart (<span id="cartCount">0</span>)
</div>

<div class="cart-modal" id="cartModal">
  <div class="cart-box">
    <h2>Your Order</h2>
    <div id="cartItems"></div>
    <h3>Total: R<span id="cartTotal">0.00</span></h3>
    <button onclick="checkoutWhatsapp()">Order on WhatsApp</button>
    <button onclick="toggleCart()">Close</button>
  </div>
</div>

<script>
const products = [
  {
    id:1,
    name:'Rice, Roasted Chicken and Veggies(Weekday Special)',
    price:150,
    image:'assets/images/roastchicken3.jpeg'
  },
  {
    id:2,
    name:'Pap and Wors(Weekend Special)',
    price:150,
    image:'assets/images/worsnpapa.webp'
  },
  {
    id:3,
    name:'Boerewors Roll (25% OFF for Students)',
    price:35,
    image:'assets/images/boerie.png'
  },
  {
    id:4,
    name:'Chilli Fries',
    price:30,
    image:'assets/images/chillifries.jpeg'
  },
  {
    id:4,
    name:'Mince Pie & Chips',
    price:55,
    image:'assets/images/pie.jpeg'
  },
  {
    id:6,
    name:'Coke 330ml',
    price:15,
    image:'assets/images/coke.jpeg'
  },
   {
    id:7,
    name:'Sprite 330ml',
    price:15,
    image:'assets/images/download.webp'
  }

];

let cart = [];

function renderProducts(){
  const menu = document.getElementById('menu');
  menu.innerHTML = products.map(product => `
    <div class="card">
      <img src="${product.image}" alt="${product.name}">
      <div class="card-content">
        <h3>${product.name}</h3>
        <div class="price">R${product.price.toFixed(2)}</div>
        <button onclick="addToCart(${product.id})">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id){
  const product = products.find(p => p.id === id);
  const existing = cart.find(item => item.id === id);

  if(existing){
    existing.qty += 1;
  } else {
    cart.push({...product, qty:1});
  }

  updateCart();
}

function updateCart(){
  document.getElementById('cartCount').textContent = cart.reduce((a,b)=>a+b.qty,0);

  const cartItems = document.getElementById('cartItems');
  cartItems.innerHTML = cart.map(item => `
    <div class="cart-item">
      <span>${item.qty}x ${item.name}</span>
      <span>R${(item.price * item.qty).toFixed(2)}</span>
    </div>
  `).join('');

  const total = cart.reduce((sum,item)=>sum + (item.price * item.qty),0);
  document.getElementById('cartTotal').textContent = total.toFixed(2);
}

function toggleCart(){
  const modal = document.getElementById('cartModal');
  modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
}

function checkoutWhatsapp(){
  if(cart.length === 0) return;

  let message = '🔥 KASI-FLAME ORDER%0A%0A';
  let total = 0;

  cart.forEach(item => {
    message += `${item.qty}x ${item.name} - R${(item.price * item.qty).toFixed(2)}%0A`;
    total += item.price * item.qty;
  });

  message += `%0ATotal: R${total.toFixed(2)}`;

  const phone = '27663995798';
  window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
}

renderProducts();
</script>

</body>
</html>
